apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: emergency-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/urangegaj/emergency-hub/frontend:latest
        imagePullPolicy: Always
        env:
        - name: GATEWAY_URL
          value: "http://gateway.emergency-hub.svc.cluster.local:8080"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: emergency-hub
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
